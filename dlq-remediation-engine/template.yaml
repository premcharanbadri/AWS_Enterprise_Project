AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Enterprise DLQ Auto-Remediation Architecture with Idempotency and SRE Alerting.

Resources:
  # 1. The Core Dead Letter Queue
  EnterpriseDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: order-fulfillment-dlq

  # 2. DynamoDB Table for Distributed Locks (Idempotency)
  IdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: dlq-idempotency-locks
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: MessageId
          AttributeType: S
      KeySchema:
        - AttributeName: MessageId
          KeyType: HASH
      # Cost Optimization: Auto-delete lock records after 24 hours
      TimeToLiveSpecification:
        AttributeName: ExpirationTime
        Enabled: true

  # 3. SNS Topic for SRE Paging
  SREAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: sre-critical-dlq-alerts

  # 4. The Python Microservice
  DLQProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: sqs_processor.lambda_handler      # <--- UPDATE THIS LINE
      Runtime: python3.10
      Timeout: 10
      # ... rest of the properties remain identical
      MemorySize: 128
      Environment:
        Variables:
          AWS_SQS_DLQ_URL: !Ref EnterpriseDLQ
          DYNAMODB_IDEMPOTENCY_TABLE: !Ref IdempotencyTable
          SNS_ALERT_TOPIC_ARN: !Ref SREAlertTopic
      # Strict Security: Grant only the exact permissions needed
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt EnterpriseDLQ.QueueName
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt SREAlertTopic.TopicName