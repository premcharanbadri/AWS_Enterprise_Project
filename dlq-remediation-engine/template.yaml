AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AWS Enterprise DLQ Auto-Remediation Engine.
  Event-driven serverless pipeline for distributed system fault tolerance.

Resources:
  # 1. The Dead Letter Queue
  EnterpriseDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: EnterpriseFailureQueue
      MessageRetentionPeriod: 1209600 # 14 days

  # 2. The Idempotency Guard (DynamoDB)
  IdempotencyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: DLQIdempotencyTable
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: MessageId
          AttributeType: S
      KeySchema:
        - AttributeName: MessageId
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ExpirationTime
        Enabled: true

  # 3. The Escalation Topic (SNS)
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: DLQEscalationAlerts

  # 4. The Execution Engine (Lambda)
  DLQRemediationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: sqs_processor.lambda_handler
      Runtime: python3.10
      Architectures:
        - arm64
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          IDEMPOTENCY_TABLE: !Ref IdempotencyTable
          DLQ_URL: !Ref EnterpriseDLQ
          ALERT_TOPIC_ARN: !Ref AlertTopic
      Policies:
        # Standard polling permissions (Receive, Delete, GetAttributes)
        - SQSPollerPolicy:
            QueueName: !GetAtt EnterpriseDLQ.QueueName
        
        # Standard DynamoDB Read/Write permissions
        - DynamoDBCrudPolicy:
            TableName: !Ref IdempotencyTable
            
        # Standard SNS Publish permissions
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt AlertTopic.TopicName

        # Explicitly grant the required permission to modify message 
        # visibility for the exponential backoff algorithm.
        - Statement:
            - Effect: Allow
              Action:
                - sqs:ChangeMessageVisibility
              Resource: !GetAtt EnterpriseDLQ.Arn

      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt EnterpriseDLQ.Arn
            BatchSize: 10
            # Enable partial-batch responses so a single failure redrives only
            # the offending message instead of the entire batch of 10.
            FunctionResponseTypes:
              - ReportBatchItemFailures

Outputs:
  DLQRemediationFunction:
    Description: "DLQ Remediation Lambda Function ARN"
    Value: !GetAtt DLQRemediationFunction.Arn
  IdempotencyTableName:
    Description: "DynamoDB Idempotency Table Name"
    Value: !Ref IdempotencyTable