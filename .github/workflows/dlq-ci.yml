name: DLQ Engine CI Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'dlq-remediation-engine/**'
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Monorepo
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Enterprise Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install boto3 pytest mock
        if [ -f dlq-remediation-engine/requirements.txt ]; then pip install -r dlq-remediation-engine/requirements.txt; fi

    - name: Execute Test Suite with Pytest
      run: |
        cd dlq-remediation-engine
        pytest test_backoff.py test_sqs_processor.py -v