name: DLQ Engine Deploy

on:
  push:
    branches: [ "main" ]
    paths:
      - 'dlq-remediation-engine/**'
      - '.github/workflows/deploy.yml'

# OIDC needs permission to request the short-lived token.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assume AWS deploy role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Build and deploy
        working-directory: dlq-remediation-engine
        run: |
          sam build
          sam deploy \
            --stack-name dlq-remediation-engine \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset
